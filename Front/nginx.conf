server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # /api/* → dt-backend on 8080
  location /api/ {
    proxy_pass http://dt-backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # /lead_agent/* → dt-lead-intelli on port 8082
  # Confirmed API: POST http://localhost:8082/api/lead_agent/start
  # Rewrite: /lead_agent/start → /api/lead_agent/start on dt-lead-intelli:8082
  location /lead_agent/ {
    rewrite ^/lead_agent/(.*)$ /api/lead_agent/$1 break;
    proxy_pass http://dt-lead-intelligence:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}