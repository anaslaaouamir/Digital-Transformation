services:
  db:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: dt-postgres
    environment:
      POSTGRES_DB: digital_transformation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mounts the script to auto-create the lead_management database
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digital_transformation"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./Back/Admin
    platform: linux/amd64
    container_name: dt-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/digital_transformation
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SERVER_PORT: "8080"
      APP_JWT_SECRET: jahsjgdJHJWEYWDBYU127357352548SSG
      APP_JWT_EXPIRATION: "86400000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./Front
      args:
        VITE_API_BASE_URL: "/api"
        VITE_APP_NAME: "Digital Transformation"
        VITE_APP_VERSION: "1.0.0"
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    platform: linux/amd64
    container_name: dt-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  discovery:
    build:
      context: ./Back/Discovery
    platform: linux/amd64
    container_name: dt-discovery
    ports:
      - "8761:8761"
    restart: unless-stopped

  lead-intelligence:
    build:
      context: ./Back/Lead-Intelligence-System
    platform: linux/amd64
    container_name: dt-lead-intelligence
    environment:
      # Overrides application.properties to point to the Docker network
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lead_management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres 
      DISCOVERY_SERVICE_URL: http://discovery:8761/eureka
    depends_on:
      db:
        condition: service_healthy
      discovery:
        condition: service_started
    ports:
      - "8081:8081"
    restart: unless-stopped

  leads-generator:
    build:
      context: ./Back/Leads_Generator
    platform: linux/amd64
    container_name: dt-leads-generator
    env_file:
      - ./Back/Leads_Generator/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  pgdata: