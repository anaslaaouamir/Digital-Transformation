
spring.application.name=Lead-Intelligence-System

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/lead_management

spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.cloud.discovery.enabled=false
# eureka.client.service-url.defaultZone=${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}

# On active tous les endPoints de actuator
management.endpoints.web.exposure.include=*
# pour avoir les adresses IP et non pas les noms
eureka.instance.prefer-ip-address=true

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers
spring.web.cors.exposed-headers=Authorization,Content-Length,Content-Type
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600
 
# Leads Generator base URL
leads.generator.base-url=${LEADS_GENERATOR_BASE_URL:http://localhost:5000}

#tracking opened emails
app.tracking.url= https://permit-nitrogen-premises-outdoor.trycloudflare.com

n8n.for.whatsap= https://marcell-unpledged-nonmythologically.ngrok-free.dev

apollo.base-url= http://localhost:8081/mock/apollo
