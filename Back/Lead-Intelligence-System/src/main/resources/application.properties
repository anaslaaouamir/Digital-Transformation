spring.application.name=Lead-Intelligence-System
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/lead_management
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true



spring.cloud.discovery.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
management.endpoints.web.exposure.include=*


spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8082/realms/dt-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8082/realms/dt-realm/protocol/openid-connect/certs